<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <style>
    .c { fill: #00f0ff; }
    .m { fill: #ff00ff; }
    .g { fill: #00ff41; }
    .a { fill: #ffb000; }
  </style>

  <!-- Left coding bracket "<" in neon green -->
  <rect class="g" x="6" y="24" width="4" height="4"/>
  <rect class="g" x="10" y="20" width="4" height="4"/>
  <rect class="g" x="14" y="16" width="4" height="4"/>
  <rect class="g" x="10" y="28" width="4" height="4"/>
  <rect class="g" x="14" y="32" width="4" height="4"/>

  <!-- Right coding bracket ">" in neon green -->
  <rect class="g" x="54" y="24" width="4" height="4"/>
  <rect class="g" x="50" y="20" width="4" height="4"/>
  <rect class="g" x="46" y="16" width="4" height="4"/>
  <rect class="g" x="50" y="28" width="4" height="4"/>
  <rect class="g" x="46" y="32" width="4" height="4"/>

  <!-- Drilling Core (Helical pattern with Cyan and Magenta) -->
  <!-- Row 1: y=12..15 -->
  <rect class="c" x="22" y="12" width="8" height="4"/>
  <rect class="m" x="30" y="12" width="4" height="4"/>
  <rect class="c" x="34" y="12" width="8" height="4"/>

  <!-- Row 2: y=16..19 -->
  <rect class="m" x="24" y="16" width="4" height="4"/>
  <rect class="c" x="28" y="16" width="8" height="4"/>
  <rect class="m" x="36" y="16" width="4" height="4"/>

  <!-- Row 3: y=20..23 -->
  <rect class="c" x="26" y="20" width="6" height="4"/>
  <rect class="m" x="32" y="20" width="6" height="4"/>

  <!-- Row 4: y=24..27 -->
  <rect class="m" x="26" y="24" width="4" height="4"/>
  <rect class="c" x="30" y="24" width="6" height="4"/>
  <rect class="m" x="36" y="24" width="2" height="4"/>

  <!-- Row 5: y=28..31 -->
  <rect class="c" x="28" y="28" width="4" height="4"/>
  <rect class="m" x="32" y="28" width="4" height="4"/>

  <!-- Row 6: y=32..35 -->
  <rect class="m" x="28" y="32" width="2" height="4"/>
  <rect class="c" x="30" y="32" width="4" height="4"/>
  <rect class="m" x="34" y="32" width="2" height="4"/>

  <!-- Row 7: y=36..39 -->
  <rect class="c" x="30" y="36" width="4" height="4"/>

  <!-- Row 8: y=40..43 -->
  <rect class="m" x="31" y="40" width="2" height="4"/>

  <!-- Tip: y=44..47 -->
  <rect class="c" x="32" y="44" width="1" height="4"/>

  <!-- Sparks / digital bits floating off the drill tip -->
  <rect class="c" x="28" y="48" width="2" height="2"/>
  <rect class="m" x="34" y="50" width="2" height="2"/>
  <rect class="g" x="31" y="54" width="2" height="2"/>
  <rect class="a" x="32" y="8" width="2" height="2"/>
  <rect class="c" x="22" y="6" width="2" height="2"/>
  <rect class="m" x="42" y="8" width="2" height="2"/>
</svg>
